<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — Saurabh Kumar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/demo.css">
</head>
<body class="demo-body">

<div class="demo-wrap" id="demo-root"></div>

<script src="demo-config.js"></script>
<script>
/* ═══════════════════════════════════════════
   Demo page — routing + rendering
   ═══════════════════════════════════════════ */

function getSlug() {
  const path = window.location.pathname;
  const match = path.match(/\/demo\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1].toLowerCase();
  const params = new URLSearchParams(window.location.search);
  if (params.get('c')) return params.get('c').toLowerCase();
  if (window.location.hash.length > 1) return window.location.hash.slice(1).toLowerCase();
  return null;
}

const slug = getSlug();
const company = slug ? DEMO_COMPANIES[slug] : null;
const root = document.getElementById('demo-root');

if (company && company.theme) {
  document.body.classList.add('demo-theme-' + company.theme);
}

function getBasePath() {
  const path = window.location.pathname;
  const idx = path.indexOf('/demo');
  if (idx > 0) return path.substring(0, idx) + '/';
  // query param fallback
  const origin = window.location.origin + window.location.pathname;
  return origin.replace(/demo\.html.*$/, '');
}
const BASE = getBasePath();

function today() {
  return new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

// ── Bottom floating nav bar (matches portfolio) ──
function navbar(companyName) {
  if (!companyName) {
    return `<nav class="demo-nav" id="demo-nav">
      <a href="${BASE}" class="demo-nav-back">\u2190 know more about me</a>
    </nav>`;
  }
  return `
    <nav class="demo-nav" id="demo-nav">
      <a href="${BASE}" class="demo-nav-back">\u2190 Me</a>
      <div class="demo-nav-links" id="demo-nav-links">
        <a href="#sec-research" class="demo-nav-link" data-sec="sec-research">Research</a>
        <a href="#sec-gaps" class="demo-nav-link" data-sec="sec-gaps">Gaps</a>
        <a href="#sec-whyme" class="demo-nav-link" data-sec="sec-whyme">Why Me</a>
        <a href="#sec-demo" class="demo-nav-link" data-sec="sec-demo">Demo</a>
        <a href="#sec-closing" class="demo-nav-link" data-sec="sec-closing">Closing</a>
      </div>
      <button class="demo-nav-toggle" id="demo-nav-toggle" aria-label="Sections">\u2261 sections</button>
      <div class="demo-nav-dropdown" id="demo-nav-dropdown">
        <a href="#sec-research" class="demo-nav-dd-link">Research</a>
        <a href="#sec-gaps" class="demo-nav-dd-link">Gaps</a>
        <a href="#sec-whyme" class="demo-nav-dd-link">Why Me</a>
        <a href="#sec-demo" class="demo-nav-dd-link">Demo</a>
        <a href="#sec-closing" class="demo-nav-dd-link">Closing</a>
      </div>
    </nav>
  `;
}

// ── Coming soon page ──
if (!company) {
  document.title = 'Demo \u2014 Saurabh Kumar';
  root.innerHTML = `
    ${navbar(null)}
    <div class="demo-soon">
      <div class="demo-soon-text">this one\u2019s still being crafted.</div>
      <a href="${BASE}" class="demo-soon-link">\u2190 back to portfolio</a>
    </div>
  `;
} else {
  // ── Full demo page ──
  document.title = `${company.companyName} \u2014 Saurabh Kumar`;

  let html = navbar(company.companyName);

  // Hero
  html += `
    <div class="demo-hero">
      <h1>${company.headline}</h1>
      <div class="demo-hero-sub">${company.subline}</div>
    </div>
  `;

  // Intro — if exists
  if (company.intro) {
    html += `
      <div class="demo-section demo-intro-section">
        <div class="demo-section-body">${company.intro}</div>
      </div>
    `;
  }

  // Section 01 — Research / Understand
  html += `
    <div class="demo-section" id="sec-research">
      <svg class="demo-bracket" viewBox="0 0 18 80" fill="none"><path d="M14 2 C6 2 4 14 4 40 C4 66 6 78 14 78"/></svg>
      <div class="demo-section-num">01</div>
      <div class="demo-section-title">${company.understand.title}</div>
      <div class="demo-section-body">${company.understand.content}</div>
    </div>
  `;

  // Section 02 — Gaps
  html += `
    <div class="demo-section" id="sec-gaps">
      <div class="demo-section-num">02</div>
      <div class="demo-section-title">${company.gaps.title}</div>
      ${company.gaps.intro ? `<div class="demo-section-body" style="margin-bottom:20px;">${company.gaps.intro}</div>` : ''}
      ${company.gaps.items.map((g, i) => `
        <div class="demo-gap-card">
          <div class="demo-gap-label">gap ${String(i + 1).padStart(2, '0')}</div>
          <div class="demo-gap-title">${g.title}</div>
          <div class="demo-gap-body">${g.content}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Section 03 — Why me
  html += `
    <div class="demo-section" id="sec-whyme">
      <div class="demo-section-num">03</div>
      <div class="demo-section-title">${company.whyme.title}</div>
      ${company.whyme.intro ? `<div class="demo-section-body" style="margin-bottom:20px;">${company.whyme.intro}</div>` : ''}
      <div class="demo-compare-header">
        <span>your problem</span>
        <span>my equivalent work</span>
      </div>
      ${company.whyme.rows.map(r => `
        <div class="demo-compare-row">
          <div class="demo-compare-problem">${r.problem}</div>
          <div class="demo-compare-work">${r.mywork}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Section 04 — Demo
  html += `
    <div class="demo-section" id="sec-demo">
      <div class="demo-section-num">04</div>
      <div class="demo-section-title">${company.demo.title}</div>
      <div class="demo-section-body" style="margin-bottom:24px;">${company.demo.intro}</div>
      <div class="demo-phone-wrap">
        <div class="demo-phone">
          <div class="demo-phone-screen" id="phone-screen"></div>
        </div>
        <div class="demo-phone-nav">
          <button class="demo-phone-btn" id="phone-prev" aria-label="Previous">\u2190 prev</button>
          <span class="demo-phone-counter" id="phone-counter"></span>
          <button class="demo-phone-btn" id="phone-next" aria-label="Next">next \u2192</button>
        </div>
        <div class="demo-screen-title" id="screen-title"></div>
        <div class="demo-screen-desc" id="screen-desc"></div>
      </div>
    </div>
  `;

  // Section 05 — Closing
  const c = company.closing;
  html += `
    <div class="demo-closing" id="sec-closing">
      <div class="demo-closing-text">${c.content}</div>
      <div class="demo-closing-name">${c.name}</div>
      <div class="demo-closing-links">
        <a href="tel:${c.phone.replace(/\s/g, '')}">${c.phone}</a><br>
        <a href="mailto:${c.email}">${c.email}</a><br>
        <a href="${c.linkedin}" target="_blank">LinkedIn \u2192</a>
      </div>
    </div>
  `;

  root.innerHTML = html;

  // ── Phone screen navigation ──
  const screens = company.demo.screens;
  let currentScreen = 0;

  function renderScreen() {
    const s = screens[currentScreen];
    document.getElementById('phone-screen').innerHTML = s.content;
    document.getElementById('phone-counter').textContent =
      String(currentScreen + 1).padStart(2, '0') + ' / ' + String(screens.length).padStart(2, '0');
    document.getElementById('screen-title').textContent = s.title;
    document.getElementById('screen-desc').textContent = s.description;
    document.getElementById('phone-prev').disabled = currentScreen === 0;
    document.getElementById('phone-next').disabled = currentScreen === screens.length - 1;
  }

  document.getElementById('phone-prev').addEventListener('click', () => {
    if (currentScreen > 0) { currentScreen--; renderScreen(); }
  });
  document.getElementById('phone-next').addEventListener('click', () => {
    if (currentScreen < screens.length - 1) { currentScreen++; renderScreen(); }
  });
  renderScreen();

  // ── Bracket draw-in on scroll ──
  const bracket = document.querySelector('.demo-bracket');
  if (bracket) {
    const bObs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) bracket.classList.add('visible'); });
    }, { threshold: 0.3 });
    bObs.observe(bracket);
  }

  // ── Active section tracking ──
  const navLinks = document.querySelectorAll('.demo-nav-link');
  const sections = document.querySelectorAll('.demo-section, .demo-closing');

  const secObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.demo-nav-link[data-sec="${e.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  sections.forEach(s => { if (s.id) secObs.observe(s); });

  // ── Mobile dropdown toggle ──
  const toggle = document.getElementById('demo-nav-toggle');
  const dropdown = document.getElementById('demo-nav-dropdown');
  if (toggle && dropdown) {
    toggle.addEventListener('click', () => {
      dropdown.classList.toggle('open');
    });
    // Close on link click
    dropdown.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => dropdown.classList.remove('open'));
    });
    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
      }
    });
  }
}
</script>
</body>
</html>
